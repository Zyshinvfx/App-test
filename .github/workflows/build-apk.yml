name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Instalar Java (necessário pro Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências do projeto
        run: npm install

      - name: Sincronizar projeto Android (Capacitor)
        run: npx cap sync android

      - name: Dar permissão de execução ao Gradle
        run: chmod +x android/gradlew

      - name: Compilar o APK (versão debug — instalável direto, sem precisar de conta de desenvolvedor)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Publicar o APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: SpreadTheGreen-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
